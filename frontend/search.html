<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOCO v2 - AI Video Search</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="search-style.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="header-content">
                <a href="search.html" class="logo">
                    <div class="logo-icon">V</div>
                    <span class="logo-text">VOCO <span style="color: var(--primary); font-weight: 800;">v2</span></span>
                </a>
                <nav class="nav">
                    <a href="search.html" class="nav-link active">Search</a>
                    <a href="admin.html" class="nav-link">Admin</a>
                </nav>
            </div>
        </div>
    </header>

    <main class="main">
        <!-- Initial Video Selection -->
        <div id="selection-view" class="container">
            <div class="hero">
                <h1>Find Any Moment.</h1>
                <p>Search through your video library using AI-powered transcription and smart object recognition.</p>
            </div>
            
            <div class="video-selector-container">
                <select id="video-dropdown" class="video-dropdown glass">
                    <option value="">Select a video to begin searching...</option>
                </select>
                <div style="position: absolute; right: 1.5rem; top: 50%; transform: translateY(-50%); pointer-events: none; color: var(--text-muted);">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M6 9l6 6 6-6"></path>
                    </svg>
                </div>
            </div>
        </div>

        <!-- Active Search View -->
        <div id="search-view" class="container hidden">
            <div style="display: flex; align-items: center; justify-content: space-between; margin: 2rem 0;">
                <h2 id="current-video-name" style="font-size: 1.5rem; font-weight: 700;">Video Title</h2>
                <button id="back-btn" class="tab-btn" style="background: rgba(255,255,255,0.05); padding: 0.5rem 1rem; border-radius: 0.5rem; border: none; color: white; cursor: pointer; display: flex; align-items: center; gap: 0.5rem;">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M19 12H5M12 19l-7-7 7-7"></path>
                    </svg>
                    Switch Video
                </button>
            </div>

            <div class="search-layout">
                <div class="main-content">
                    <div class="glass search-box">
                        <div class="search-tabs">
                            <button class="tab-btn active" data-tab="transcript">Transcript</button>
                            <button class="tab-btn" data-tab="objects">Objects</button>
                            <button class="tab-btn" data-tab="visual-text">Visual Text</button>
                        </div>

                        <div class="search-input-wrapper">
                            <div class="search-icon-abs">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                                    <circle cx="11" cy="11" r="8"></circle>
                                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                                </svg>
                            </div>
                            <input type="text" id="search-input" class="search-input" placeholder="What are you looking for?" autocomplete="off">
                        </div>

                        <!-- Filter Tags Container -->
                        <div id="filter-tags-section" class="filter-tags-section hidden">
                            <span class="filter-label">Common:</span>
                            <div id="filter-tags-container" style="display: flex; flex-wrap: wrap; gap: 0.5rem;">
                                <!-- Dynamic Tags -->
                            </div>
                        </div>
                    </div>

                    <!-- Full Transcript Collapsible (Kept from last version) -->
                    <div class="transcript-collapsible glass" style="margin-top: 1rem;">
                        <button class="collapsible-trigger" id="transcript-trigger">
                            <div class="trigger-content">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                                    <polyline points="14 2 14 8 20 8"></polyline>
                                </svg>
                                <span id="trigger-text">Show Full Transcript</span>
                            </div>
                            <svg class="chevron" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M6 9l6 6 6-6"></path>
                            </svg>
                        </button>
                        <div class="collapsible-content hidden" id="full-transcript-content">
                            <div class="transcript-loading">Loading transcript...</div>
                        </div>
                    </div>

                    <div class="player-container glass" style="margin-top: 1rem;">
                        <video id="video-player" controls preload="auto"></video>
                        
                        <div class="timeline-wrapper">
                            <div class="timeline-labels">
                                <span>Speech</span>
                                <span>Objects</span>
                                <span>Visual Text</span>
                            </div>
                            <div class="timeline-container" id="timeline-container">
                                <div class="timeline-layer" id="layer-transcript"></div>
                                <div class="timeline-layer" id="layer-objects"></div>
                                <div class="timeline-layer" id="layer-visual-text"></div>
                                <div class="timeline-playhead" id="timeline-playhead"></div>
                            </div>
                            <div class="timeline-time">
                                <span id="current-time">00:00</span>
                                <span id="total-time">00:00</span>
                            </div>
                        </div>
                    </div>
                </div>

                <aside class="sidebar">
                    <div class="glass results-panel">
                        <div class="results-header">
                            <h3 style="font-size: 1.15rem; font-weight: 700;">Results</h3>
                            <span id="results-count" style="font-size: 0.85rem; color: var(--text-muted);">0 found</span>
                        </div>
                        <div id="results-list" class="results-list">
                            <!-- Dynamic Results -->
                            <div id="empty-results" style="text-align: center; padding: 3rem 1rem; color: var(--text-muted);">
                                Enter a query to see results
                            </div>
                        </div>
                    </div>
                </aside>
            </div>
        </div>
    </main>

    <div class="toast hidden" id="toast">
        <span id="toast-message"></span>
    </div>

    <script src="search.js"></script>
</body>
</html>
